name: Build and Deploy to EC2

on:
  push:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  # github.repository returns 'username/repo'
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ec2:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          # To ensure the image names use lowercase logic if needed, we pass the image name directly
          # but github.repository is usually safe. 
          script: |
            # Ensure Docker is logged into GHCR on the EC2 machine
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # Use the lowercase repository string for the image name
            IMAGE="ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]'):latest"
            
            # Pull the new image
            docker pull $IMAGE
            
            # Stop current running container if exists
            docker stop rag-system-app || true
            
            # Remove the old container
            docker rm rag-system-app || true
            
            # Run the new container, mapping port 8501 to 8501
            docker run -d \
              --name rag-system-app \
              --restart unless-stopped \
              -p 8501:8501 \
              $IMAGE
